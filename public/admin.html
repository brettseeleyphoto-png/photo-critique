<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seeley Photo Critique — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: #090909; color: #e2ddd7; font-family: 'Georgia', serif; }
    header { border-bottom: 1px solid #2a2a2a; padding: 20px 36px; display: flex; align-items: center; gap: 12px; }
    .header-brand { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.2em; }
    .header-divider { width: 1px; height: 12px; background: #333; }
    .header-title { font-size: 16px; color: #aaa49e; }
    .header-count { margin-left: auto; font-size: 11px; color: #555; }
    main { max-width: 1200px; margin: 0 auto; padding: 40px 36px; }

    /* Login */
    #login-screen { max-width: 380px; margin: 80px auto; padding: 36px; border: 1px solid #1e1e1e; border-radius: 2px; }
    .login-title { font-size: 16px; color: #aaa49e; margin-bottom: 6px; }
    .login-sub { font-size: 12px; color: #444; margin-bottom: 24px; }
    input[type=password] { width: 100%; padding: 10px 12px; background: #0f0f0f; border: 1px solid #1e1e1e; border-radius: 2px; color: #e2ddd7; font-size: 13px; font-family: monospace; outline: none; margin-bottom: 10px; }
    .btn { width: 100%; padding: 12px; background: #e2ddd7; color: #090909; border: none; border-radius: 2px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; cursor: pointer; font-family: 'Georgia', serif; }
    .err { margin-top: 8px; font-size: 12px; color: #ef4444; }

    /* Stats bar */
    .stats { display: flex; gap: 32px; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid #1a1a1a; }
    .stat-item { }
    .stat-num { font-size: 28px; color: #c8c0b4; }
    .stat-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.15em; margin-top: 2px; }

    /* Submissions grid */
    .submissions { display: flex; flex-direction: column; gap: 24px; }
    .submission { border: 1px solid #1a1a1a; border-radius: 2px; overflow: hidden; }
    .sub-header { padding: 16px 20px; background: #0e0e0e; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .sub-name { font-size: 14px; color: #c8c0b4; }
    .sub-email { font-size: 12px; color: #555; }
    .sub-date { margin-left: auto; font-size: 11px; color: #3a3a3a; }
    .sub-body { display: grid; grid-template-columns: 240px 1fr; }
    @media (max-width: 700px) { .sub-body { grid-template-columns: 1fr; } }
    .sub-image { background: #0a0a0a; }
    .sub-image img { width: 100%; height: 100%; object-fit: cover; max-height: 320px; display: block; }
    .sub-image .no-img { padding: 40px; text-align: center; font-size: 11px; color: #2a2a2a; text-transform: uppercase; letter-spacing: 0.15em; }
    .storage-warning { padding: 10px 12px; border-top: 1px solid #241111; color: #b45353; font-size: 11px; line-height: 1.5; }
    .sub-right { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .shot-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .field-item { }
    .field-label { font-size: 9px; color: #3a3a3a; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 2px; }
    .field-value { font-size: 12px; color: #666; }
    .critique-section { border-top: 1px solid #141414; padding-top: 16px; }
    .critique-label { font-size: 9px; color: #3a3a3a; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; }
    .critique-text { font-size: 12px; color: #5a5248; line-height: 1.8; white-space: pre-wrap; }
    .feedback-section { border-top: 1px solid #141414; padding-top: 16px; }
    .rating-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .rating-chip { border: 1px solid #272019; padding: 6px 8px; font-size: 11px; color: #8a8175; background: #0b0a09; }
    .rating-chip strong { color: #c8c0b4; font-weight: normal; }
    .brett-review { border-top: 1px solid #141414; padding-top: 16px; }
    .brett-review textarea { width: 100%; min-height: 130px; padding: 10px 12px; background: #0f0f0f; border: 1px solid #1e1e1e; color: #c8c4be; font-size: 12px; line-height: 1.6; font-family: Georgia, serif; resize: vertical; outline: none; }
    .brett-review textarea:focus { border-color: #3a3a3a; }
    .mini-btn { margin-top: 8px; padding: 8px 11px; background: #c8c0b4; color: #090909; border: none; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; cursor: pointer; font-family: Georgia, serif; }
    .email-draft-link { display: inline-block; margin: 8px 0 0 8px; padding: 8px 11px; border: 1px solid #2a241f; color: #c8c0b4; text-decoration: none; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; }
    .save-status { margin-top: 7px; min-height: 16px; color: #555; font-size: 11px; }
    .save-status.ok { color: #8fbf85; }
    .save-status.err { color: #b45353; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 1px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; margin-right: 6px; }
  </style>
</head>
<body>
<header>
  <span class="header-brand">Seeley Photo Critique</span>
  <span class="header-divider"></span>
  <span class="header-title">Admin Dashboard</span>
  <span class="header-count" id="header-count"></span>
</header>
<main>
  <div id="login-screen">
    <div class="login-title">Admin Access</div>
    <div class="login-sub">Enter your admin password to view submissions.</div>
    <input type="password" id="pwd-input" placeholder="Password" />
    <button class="btn" onclick="loadSubmissions()">Enter</button>
    <div class="err" id="login-err"></div>
  </div>

  <div id="dashboard" style="display:none;">
    <div class="stats">
      <div class="stat-item">
        <div class="stat-num" id="total-count">—</div>
        <div class="stat-label">Total Submissions</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="unique-users">—</div>
        <div class="stat-label">Unique Users</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="today-count">—</div>
        <div class="stat-label">Today</div>
      </div>
    </div>
    <div class="submissions" id="submissions-list"></div>
  </div>
</main>

<script>
  var password = '';
  var PRODUCTION_ORIGIN = 'https://photo-critique-psi.vercel.app';
  var API_ORIGIN = (location.protocol === 'file:' || location.hostname === '127.0.0.1' || location.hostname === 'localhost') ? PRODUCTION_ORIGIN : '';

  document.getElementById('pwd-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loadSubmissions();
  });

  function loadSubmissions() {
    password = document.getElementById('pwd-input').value;
    fetch(apiPath('/api/admin?password=' + encodeURIComponent(password)))
      .then(readJsonResponse)
      .then(function(data) {
        if (data.error) { document.getElementById('login-err').textContent = data.error; return; }
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        renderDashboard(data.submissions);
      })
      .catch(function(e) { document.getElementById('login-err').textContent = 'Error: ' + e.message; });
  }

  function renderDashboard(subs) {
    window.currentSubmissions = subs;
    var total = subs.length;
    var uniqueEmails = new Set(subs.map(function(s) { return s.email; })).size;
    var today = new Date().toDateString();
    var todayCount = subs.filter(function(s) { return new Date(s.created_at).toDateString() === today; }).length;

    document.getElementById('total-count').textContent = total;
    document.getElementById('unique-users').textContent = uniqueEmails;
    document.getElementById('today-count').textContent = todayCount;
    document.getElementById('header-count').textContent = total + ' submission' + (total !== 1 ? 's' : '');

    var list = document.getElementById('submissions-list');
    list.innerHTML = '';

    subs.forEach(function(s) {
      var date = new Date(s.created_at).toLocaleString();
      var div = document.createElement('div');
      div.className = 'submission';
      div.innerHTML =
        '<div class="sub-header">' +
          '<div class="sub-name">' + esc(s.name) + '</div>' +
          '<div class="sub-email">' + esc(s.email) + '</div>' +
          '<div class="sub-date">' + date + '</div>' +
        '</div>' +
        '<div class="sub-body">' +
          '<div class="sub-image">' +
            imageMarkup(s) +
          '</div>' +
          '<div class="sub-right">' +
            '<div class="shot-fields">' +
              field('Lights', s.num_lights) +
              field('Light Type', s.light_type) +
              field('Modifiers', s.modifiers) +
              field('Creative Elements', s.creative) +
              field('Shoot Type', s.shoot_type) +
              field('Post-Processing', s.post_processing) +
              field('Image Type', s.image_mime_type) +
              field('Original File', s.original_filename) +
              (s.extra_context ? '<div class="field-item" style="grid-column:1/-1">' + field('Additional Context', s.extra_context) + '</div>' : '') +
            '</div>' +
            '<div class="critique-section">' +
              '<div class="critique-label">Critique</div>' +
              '<div class="critique-text">' + esc(s.critique).replace(/\*\*/g, '') + '</div>' +
            '</div>' +
            '<div class="feedback-section">' +
              '<div class="critique-label">User Agreement Ratings</div>' +
              feedbackMarkup(s) +
            '</div>' +
            '<div class="brett-review">' +
              '<div class="critique-label">Brett Updated Review</div>' +
              '<textarea id="brett-review-' + s.id + '" placeholder="Write Brett&apos;s corrected human review here.">' + escTextarea(s.brett_correction) + '</textarea>' +
              '<button class="mini-btn" onclick="saveBrettReview(' + s.id + ')">Save + Email Updated Review</button>' +
              '<span id="draft-link-wrap-' + s.id + '">' + draftEmailLink(s, s.brett_correction) + '</span>' +
              '<div class="save-status" id="save-status-' + s.id + '">' + reviewStatusText(s) + emailStatusText(s) + '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      list.appendChild(div);
    });

    if (subs.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:60px;font-size:12px;color:#333;">No submissions yet.</div>';
    }
  }

  function field(label, value) {
    if (!value) return '';
    return '<div class="field-item"><div class="field-label">' + label + '</div><div class="field-value">' + esc(value) + '</div></div>';
  }

  function imageMarkup(s) {
    var html = '';
    if (s.image_pathname) {
      html += '<img src="' + apiPath('/api/image?password=' + encodeURIComponent(password) + '&pathname=' + encodeURIComponent(s.image_pathname)) + '" alt="Submission" loading="lazy" />';
    } else if (s.image_url && s.image_url.indexOf('.public.blob.vercel-storage.com') !== -1) {
      html += '<img src="' + esc(s.image_url) + '" alt="Submission" loading="lazy" />';
    } else {
      html += '<div class="no-img">No image saved</div>';
    }
    if (s.storage_error) {
      html += '<div class="storage-warning">Storage error: ' + esc(s.storage_error) + '</div>';
    }
    return html;
  }

  function feedbackMarkup(s) {
    var ratings = s.ai_feedback_ratings || {};
    if (typeof ratings === 'string') {
      try { ratings = JSON.parse(ratings); } catch (e) { ratings = {}; }
    }
    var keys = Object.keys(ratings);
    if (!keys.length) return '<div class="field-value">No section ratings submitted yet.</div>';
    var html = '<div class="rating-list">';
    keys.forEach(function(key) {
      html += '<div class="rating-chip">' + esc(key) + ': <strong>' + esc(ratings[key]) + '/10</strong></div>';
    });
    html += '</div>';
    if (s.feedback_submitted_at) {
      html += '<div class="field-value" style="margin-top:8px;">Submitted ' + new Date(s.feedback_submitted_at).toLocaleString() + '</div>';
    }
    return html;
  }

  function reviewStatusText(s) {
    if (s.brett_corrected_at) return 'Saved ' + new Date(s.brett_corrected_at).toLocaleString();
    return s.brett_correction_status === 'reviewed' ? 'Saved' : '';
  }

  function draftEmailLink(s, correction) {
    if (!s.email || !correction) return '';
    return '<a class="email-draft-link" href="' + mailtoHref(s, correction) + '">Draft Email Manually</a>';
  }

  function mailtoHref(s, correction) {
    var subject = 'Your updated photo critique from Brett';
    var body = [
      'Hi ' + (s.name || 'there') + ',',
      '',
      'Brett reviewed your photo critique submission and added an updated human review below.',
      '',
      correction,
      '',
      'Thank you for helping improve the critique process.',
      '',
      'Seeley Photo Critique'
    ].join('\n');
    return 'mailto:' + encodeURIComponent(s.email) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
  }

  function emailStatusText(s) {
    if (s.brett_email_sent_at) return '<br>Email sent ' + new Date(s.brett_email_sent_at).toLocaleString();
    if (s.brett_email_error) return '<br>Email not sent: ' + esc(s.brett_email_error);
    return '';
  }

  function saveBrettReview(id) {
    var textarea = document.getElementById('brett-review-' + id);
    var status = document.getElementById('save-status-' + id);
    var submission = currentSubmission(id);
    var draftWrap = document.getElementById('draft-link-wrap-' + id);
    if (draftWrap && submission) draftWrap.innerHTML = draftEmailLink(submission, textarea.value);
    status.className = 'save-status';
    status.textContent = 'Saving...';
    fetch(apiPath('/api/brett-review'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        password: password,
        critiqueId: id,
        correction: textarea.value
      })
    })
    .then(readJsonResponse)
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      if (data.emailSent) {
        status.className = 'save-status ok';
        status.textContent = 'Updated review saved and emailed.';
      } else if (data.emailError) {
        status.className = 'save-status err';
        status.textContent = 'Updated review saved, but email was not sent: ' + data.emailError;
      } else {
        status.className = 'save-status ok';
        status.textContent = 'Updated review saved.';
      }
    })
    .catch(function(e) {
      status.className = 'save-status err';
      status.textContent = 'Error: ' + e.message;
    });
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escTextarea(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function currentSubmission(id) {
    var subs = window.currentSubmissions || [];
    for (var i = 0; i < subs.length; i++) {
      if (Number(subs[i].id) === Number(id)) return subs[i];
    }
    return null;
  }

  function apiPath(path) {
    return API_ORIGIN + path;
  }

  function readJsonResponse(res) {
    return res.text().then(function(text) {
      var data = {};
      if (text) {
        try { data = JSON.parse(text); }
        catch (e) { throw new Error('The admin service did not return a valid response.'); }
      }
      if (!res.ok) throw new Error(data.error || 'The admin request failed.');
      return data;
    });
  }
</script>
</body>
</html>
<script>
// Fix: strip ** markers from critique display
var orig = window.renderCritique || null;
</script>
